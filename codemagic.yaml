workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        # BUNDLE_ID and APPLE_ID are non-secret — set here directly
        BUNDLE_ID: com.habitatbuilder.app
        APP_STORE_APPLE_ID: "6761064884" # Replace with your App Store app numeric ID after creating it in App Store Connect
      # All secrets below must be added in Codemagic UI under
      # App settings → Environment variables → Secure
      groups:
        - app_store_credentials  # CERTIFICATE_PRIVATE_KEY, ISSUER_ID, KEY_IDENTIFIER, APP_STORE_CONNECT_API_KEY

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build
        env:
          # These must be set as secure env vars in Codemagic UI
          VITE_SUPABASE_URL: $VITE_SUPABASE_URL
          VITE_SUPABASE_ANON_KEY: $VITE_SUPABASE_ANON_KEY
          VITE_VAPID_PUBLIC_KEY: $VITE_VAPID_PUBLIC_KEY

      - name: Add iOS platform (if not already present)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build and archive iOS app
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --export-options-plist "/Users/builder/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $KEY_IDENTIFIER
        issuer_id: $ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
        submit_to_app_store: false  # Set to true when ready for full release
